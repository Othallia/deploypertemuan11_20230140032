<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register | My App</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">

<div class="max-w-md w-full bg-white rounded-xl shadow-lg p-8 border border-slate-100">
    <div class="text-center mb-8">
        <h2 class="text-2xl font-bold text-slate-800">Create an Account</h2>
        <p class="text-slate-500 text-sm mt-2">Daftarkan dirimu untuk mengakses dashboard</p>
    </div>

    <form th:action="@{/register}" th:object="${request}" method="post" class="space-y-5">
        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Nama Lengkap</label>
            <input type="text" th:field="*{nama}" required
                   class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors outline-none"
                   placeholder="Masukkan nama lengkap">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Alamat</label>
            <input type="text" th:field="*{alamat}" required
                   class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors outline-none"
                   placeholder="Masukkan alamat domisili">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Username</label>
            <input type="text" th:field="*{username}" required
                   class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors outline-none"
                   placeholder="Pilih username">
        </div>

        <div>
            <label class="block text-sm font-medium text-slate-700 mb-1">Password</label>
            <input type="password" th:field="*{password}" required
                   class="w-full px-4 py-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 focus:border-blue-500 transition-colors outline-none"
                   placeholder="Buat password yang kuat">
        </div>

        <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition-colors shadow-sm mt-4">
            Sign Up
        </button>
    </form>

    <p class="text-center text-sm text-slate-600 mt-6">
        Sudah punya akun?
        <a th:href="@{/login}" class="text-blue-600 hover:text-blue-800 font-medium transition-colors">Login di sini</a>
    </p>
</div>

</body>
</html>
